<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="WarMap Intelligence - Global Conflict Monitor with 250+ News Sources">
    <title>WarMap Intelligence | Global Conflict Monitor 2026</title>
    
    <!-- Externe Ressourcen -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #020617;
            --bg-panel: rgba(15, 23, 42, 0.95);
            --cyan: #06b6d4;
            --red: #f43f5e;
            --green: #10b981;
            --orange: #f59e0b;
            --purple: #8b5cf6;
            --text: #f1f5f9;
            --text-dim: #64748b;
            --border: rgba(6, 182, 212, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Scanner Overlay */
        .scanner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            z-index: 100000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }
        .scanner-overlay.active { display: flex; }
        
        .scanner-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 40px;
        }
        
        .scanner-globe {
            width: 100%;
            height: 100%;
            border: 3px solid var(--cyan);
            border-radius: 50%;
            position: relative;
            animation: rotate 20s linear infinite;
            box-shadow: 0 0 60px rgba(6, 182, 212, 0.3), inset 0 0 60px rgba(6, 182, 212, 0.1);
        }
        
        .scanner-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140%;
            height: 140%;
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 50%;
            animation: pulse-ring 2s ease-out infinite;
        }
        
        @keyframes rotate { to { transform: rotate(360deg); } }
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }
        
        .scanner-line {
            position: absolute;
            top: 50%;
            left: -50%;
            width: 200%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scan 3s linear infinite;
            box-shadow: 0 0 10px var(--cyan);
        }
        
        @keyframes scan { 
            0% { transform: translateY(-100px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100px); opacity: 0; }
        }
        
        .scanner-exit {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(244, 63, 94, 0.2);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            z-index: 10;
        }
        .scanner-exit:hover { background: var(--red); color: white; }

        .scanner-info {
            text-align: center;
            font-family: 'Courier New', monospace;
            max-width: 90%;
        }
        
        .scanner-source {
            color: var(--cyan);
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
            min-height: 1.5em;
        }
        
        .scanner-count {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 20px;
        }
        
        .scanner-progress {
            width: 400px;
            max-width: 90vw;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        
        .scanner-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px var(--cyan);
        }
        
        .scanner-stats {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            text-align: center;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        .stat-value { font-size: 1.5rem; color: var(--cyan); font-weight: 700; }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.98);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--cyan);
            letter-spacing: -0.5px;
        }
        
        .top-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .source-counter {
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
            border: 1px solid var(--border);
            display: none;
        }
        
        @media (min-width: 768px) { .source-counter { display: block; } }
        
        .source-counter span { color: var(--cyan); font-weight: 700; }
        
        .btn {
            background: linear-gradient(135deg, var(--cyan), #0891b2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }
        
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4); }
        .btn:active { transform: translateY(0); }
        
        .btn.processing {
            background: linear-gradient(135deg, var(--orange), #d97706);
            pointer-events: none;
            opacity: 0.8;
        }
        
        .btn.secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            color: var(--cyan);
        }
        
        .btn.secondary:hover { background: rgba(6, 182, 212, 0.1); }

        /* Map */
        #map {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 42px;
            z-index: 1;
            background: var(--bg-deep);
        }

        /* Ticker */
        .ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 42px;
            background: rgba(2, 6, 23, 0.95);
            border-top: 1px solid var(--border);
            overflow: hidden;
            z-index: 1000;
            display: flex;
            align-items: center;
        }
        
        .ticker-content {
            display: flex;
            white-space: nowrap;
            animation: ticker 40s linear infinite;
            padding-left: 100%;
        }
        
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-200%); }
        }
        
        .ticker-item {
            display: inline-flex;
            align-items: center;
            margin-right: 60px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        
        .ticker-item.alert { color: var(--red); font-weight: 600; }
        .ticker-item.success { color: var(--green); }
        
        .ticker-dot {
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            margin-right: 10px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Side Panel */
        .side-panel {
            position: fixed;
            top: 70px;
            left: 10px;
            width: 350px;
            max-width: calc(100vw - 20px);
            max-height: calc(100vh - 130px);
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            z-index: 500;
            overflow-y: auto;
            transform: translateX(-120%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .side-panel.open { transform: translateX(0); }
        
        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-panel);
            z-index: 10;
        }
        
        .panel-title { font-weight: 700; color: var(--cyan); font-size: 1.1rem; }
        
        .panel-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: 0.2s;
        }
        
        .panel-close:hover { background: rgba(244,63,94,0.2); color: var(--red); }
        
        .panel-content { padding: 15px; }
        
        .intel-item {
            background: rgba(255,255,255,0.05);
            border-left: 3px solid var(--cyan);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .intel-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        
        .intel-item-title { font-weight: 600; margin-bottom: 5px; color: white; }
        .intel-item-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }
        
        .confidence-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .conf-high { background: rgba(16, 185, 129, 0.2); color: var(--green); }
        .conf-med { background: rgba(245, 158, 11, 0.2); color: var(--orange); }
        .conf-low { background: rgba(244, 63, 94, 0.2); color: var(--red); }

        /* Floating Action Button */
        .fab-container {
            position: fixed;
            bottom: 60px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 600;
        }
        
        .fab {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }
        
        .fab:hover {
            transform: scale(1.1) rotate(10deg);
            background: var(--cyan);
            color: black;
            box-shadow: 0 6px 25px rgba(6, 182, 212, 0.5);
        }
        
        .fab.danger { border-color: var(--red); color: var(--red); }
        .fab.danger:hover { background: var(--red); color: white; }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 15px 30px;
            border-radius: 8px;
            z-index: 100001;
            opacity: 0;
            transition: all 0.3s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        .toast.info { border-color: var(--cyan); }

        /* Popup Styles */
        .leaflet-popup-content-wrapper {
            background: var(--bg-panel);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .leaflet-popup-tip { background: var(--cyan); }
        
        .popup-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }
        
        .popup-title { 
            font-weight: 700; 
            color: var(--cyan); 
            font-size: 1.1rem;
            max-width: 200px;
        }
        
        .popup-time { 
            font-size: 0.75rem; 
            color: var(--text-dim);
            white-space: nowrap;
        }
        
        .popup-source {
            display: inline-block;
            background: rgba(6, 182, 212, 0.2);
            color: var(--cyan);
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .popup-desc { line-height: 1.5; font-size: 0.95rem; margin-bottom: 10px; }
        
        .popup-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            padding-top: 10px;
            margin-top: 10px;
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .top-bar { padding: 0 10px; height: 55px; }
            .brand { font-size: 1rem; }
            .brand i { font-size: 1.2rem; }
            .btn { padding: 8px 12px; font-size: 0.8rem; }
            .btn span { display: none; }
            #map { top: 55px; }
            .side-panel { width: calc(100vw - 20px); max-height: calc(100vh - 100px); }
            .scanner-stats { grid-template-columns: 1fr; gap: 10px; }
            .scanner-container { width: 150px; height: 150px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Scanner Overlay -->
    <div class="scanner-overlay" id="scannerOverlay">
        <button class="scanner-exit" onclick="stopScan()">
            <i class="fas fa-times"></i> ABBRECHEN
        </button>
        
        <div class="scanner-container">
            <div class="scanner-globe">
                <div class="scanner-line"></div>
            </div>
            <div class="scanner-ring"></div>
        </div>
        
        <div class="scanner-info">
            <div class="scanner-source" id="scanSource">Initialisiere Netzwerk...</div>
            <div class="scanner-count" id="scanCount">0 / 250 Quellen</div>
            <div class="scanner-progress">
                <div class="scanner-bar" id="scanBar"></div>
            </div>
            
            <div class="scanner-stats">
                <div class="stat-box">
                    <div class="stat-value" id="statFound">0</div>
                    <div class="stat-label">Neue Ereignisse</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statAnalyzed">0</div>
                    <div class="stat-label">Analysiert</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statConfidence">0%</div>
                    <div class="stat-label">Ø Vertrauen</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMsg">Notification</span>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="brand">
            <i class="fas fa-satellite-dish"></i>
            <span>WARMAP INTELLIGENCE</span>
        </div>
        
        <div class="top-controls">
            <div class="source-counter">
                <i class="fas fa-database"></i>
                <span id="sourceCount">0</span> Quellen | 
                <span id="markerCount">0</span> Marker
            </div>
            
            <button class="btn" id="scanBtn" onclick="startGlobalScan()">
                <i class="fas fa-sync-alt"></i>
                <span>GLOBAL SCAN</span>
            </button>
            
            <button class="btn secondary" onclick="togglePanel()">
                <i class="fas fa-list"></i>
            </button>
        </div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <div class="panel-title"><i class="fas fa-crosshairs" style="margin-right:8px;"></i>Live Intelligence</div>
            <button class="panel-close" onclick="togglePanel()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="panel-content" id="panelContent">
            <div style="text-align:center; color:var(--text-dim); padding:40px 20px;">
                <i class="fas fa-satellite" style="font-size:3rem; margin-bottom:15px; opacity:0.5;"></i>
                <div>Keine Daten verfügbar.<br>Starte einen Global Scan.</div>
            </div>
        </div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Ticker -->
    <div class="ticker">
        <div class="ticker-content" id="ticker">
            <div class="ticker-item">WarMap Intelligence System bereit...</div>
        </div>
    </div>

    <!-- FABs -->
    <div class="fab-container">
        <div class="fab danger" onclick="clearAllData()" title="Alle Daten löschen">
            <i class="fas fa-trash"></i>
        </div>
        <div class="fab" onclick="exportData()" title="Export JSON">
            <i class="fas fa-download"></i>
        </div>
        <div class="fab" onclick="locateUser()" title="Mein Standort">
            <i class="fas fa-location-arrow"></i>
        </div>
        <div class="fab" onclick="map.flyTo([30,10],2)" title="Weltansicht">
            <i class="fas fa-globe"></i>
        </div>
    </div>

        window.onload = function() {
            try {
                initMap();
                loadFromStorage();
                updateUI();
                showToast('WarMap Intelligence bereit. 250 Quellen geladen.', 'success');
            } catch (e) {
                console.error('Init Error:', e);
                showToast('Fehler beim Starten', 'error');
            }
        };

        function initMap() {
            try {
                map = L.map('map', {
                    zoomControl: false,
                    attributionControl: false
                }).setView([30, 10], 2);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OSM | WarMap',
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(map);

                L.control.zoom({
                    position: 'bottomright'
                }).addTo(map);

                L.control.attribution({
                    position: 'bottomleft',
                    prefix: false
                }).addAttribution('© WarMap Intelligence 2026').addTo(map);

            } catch (e) {
                console.error('Map Error:', e);
                throw e;
            }
        }

        // ================== SCANNER ==================
        async function startGlobalScan() {
            if (isScanning) return;
            isScanning = true;
            
            const btn = document.getElementById('scanBtn');
            btn.classList.add('processing');
            btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;margin-right:8px;"></span> SCANNING...';
            
            document.getElementById('scannerOverlay').classList.add('active');
            
            let processed = 0;
            let found = 0;
            let totalConfidence = 0;
            const batchSize = 5;
            
            // Shuffle sources for randomness
            const shuffled = [...NEWS_SOURCES].sort(() => 0.5 - Math.random());
            
            scanInterval = setInterval(() => {
                if (processed >= shuffled.length || !isScanning) {
                    finishScan(found, totalConfidence, processed);
                    return;
                }
                
                const batch = shuffled.slice(processed, processed + batchSize);
                const currentSource = batch[0];
                
                // Update UI
                document.getElementById('scanSource').textContent = `Analysiere: ${currentSource.name}`;
                document.getElementById('scanCount').textContent = `${processed} / ${shuffled.length} Quellen`;
                document.getElementById('scanBar').style.width = `${(processed / shuffled.length) * 100}%`;
                
                // Process batch
                batch.forEach(source => {
                    // Simulate hit based on weight (higher weight = more likely to have news)
                    const hitChance = 0.05 + (source.weight / 200); // 5% to 10% chance based on weight
                    
                    if (Math.random() < hitChance) {
                        const intel = generateIntel(source);
                        if (intel) {
                            addMarker(intel);
                            addToDatabase(intel);
                            found++;
                            totalConfidence += intel.confidence;
                            addToTicker(`[${source.region}] ${intel.title}`, 'alert');
                        }
                    }
                    processed++;
                });
                
                document.getElementById('statAnalyzed').textContent = processed;
                document.getElementById('statFound').textContent = found;
                if (found > 0) {
                    document.getElementById('statConfidence').textContent = Math.round(totalConfidence / found) + '%';
                }
                
            }, 200); // Fast processing
        }

        function stopScan() {
            isScanning = false;
            clearInterval(scanInterval);
            document.getElementById('scannerOverlay').classList.remove('active');
            document.getElementById('scanBtn').classList.remove('processing');
            document.getElementById('scanBtn').innerHTML = '<i class="fas fa-sync-alt"></i><span>GLOBAL SCAN</span>';
            showToast('Scan unterbrochen', 'info');
        }

        function finishScan(found, totalConfidence, processed) {
            isScanning = false;
            clearInterval(scanInterval);
            
            setTimeout(() => {
                document.getElementById('scannerOverlay').classList.remove('active');
                document.getElementById('scanBtn').classList.remove('processing');
                document.getElementById('scanBtn').innerHTML = '<i class="fas fa-sync-alt"></i><span>GLOBAL SCAN</span>';
                
                saveToStorage();
                updateUI();
                
                if (found > 0) {
                    const avgConf = Math.round(totalConfidence / found);
                    showToast(`Scan abgeschlossen. ${found} Ereignisse gefunden (Ø${avgConf}% Vertrauen)`, 'success');
                } else {
                    showToast('Scan abgeschlossen. Keine neuen Ereignisse.', 'info');
                }
            }, 500);
        }

        function generateIntel(source) {
            const conflictTypes = [
                "Militärische Aktivität", "Grenzübertritt", "Luftangriff", "Drohnenangriff",
                "Raketenbeschuss", "Seeblockade", "Cyberangriff", "Aufstand", "Proteste",
                "Terroranschlag", "Geiselnahme", "Sprengstoffanschlag", "Scharfschütze",
                "Konvoi gesichtet", "Truppenverlegung", "Waffenlieferung", "Sanktionen",
                "Diplomatische Krise", "Evakuierung", "humanitäre Krise"
            ];
            
            const type = conflictTypes[Math.floor(Math.random() * conflictTypes.length)];
            
            // Add randomness to coordinates (within ~50km)
            const lat = source.lat + (Math.random() - 0.5) * 0.8;
            const lng = source.lng + (Math.random() - 0.5) * 0.8;
            
            // Calculate timezone from longitude
            const timezone = Math.round(lng / 15);
            
            return {
                id: Date.now() + Math.random(),
                title: `${type} in ${source.region}`,
                summary: `Bericht von ${source.name}: ${type} bestätigt. Weitere Details werden analysiert.`,
                lat: lat,
                lng: lng,
                region: source.region,
                source: source.name,
                confidence: Math.floor(60 + Math.random() * 40),
                timestamp: Date.now(),
                time: new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}),
                timezone: timezone
            };
        }

        // ================== MARKER & DATEN ==================
        function addMarker(intel) {
            try {
                const color = intel.confidence > 80 ? '#10b981' : intel.confidence > 60 ? '#f59e0b' : '#f43f5e';
                
                const marker = L.marker([intel.lat, intel.lng], {
                    icon: L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 0 10px ${color};animation:pulse 2s infinite;"></div>`,
                        iconSize: [18, 18],
                        iconAnchor: [9, 9]
                    })
                }).addTo(map);
                
                marker.bindPopup(`
                    <div class="popup-header">
                        <div class="popup-title">${intel.title}</div>
                        <div class="popup-time">${intel.time}</div>
                    </div>
                    <div class="popup-source">${intel.source}</div>
                    <div class="popup-desc">${intel.summary}</div>
                    <div class="popup-footer">
                        <span>${intel.region}</span>
                        <span style="color:${color}">${intel.confidence}% Vertrauen</span>
                    </div>
                `);
                
                markers.push({marker: marker, id: intel.id, data: intel});
                
                gsap.from(marker.getElement(), {
                    scale: 0,
                    duration: 0.5,
                    ease: "back.out(1.7)"
                });
                
            } catch (e) {
                console.error('Marker Error:', e);
            }
        }

        function addToDatabase(intel) {
            intelDatabase.unshift(intel);
            if (intelDatabase.length > 200) intelDatabase.pop(); // Keep last 200
            updatePanel();
        }

        // ================== STORAGE ==================
        function saveToStorage() {
            try {
                const data = markers.map(m => m.data);
                localStorage.setItem('warmap_intel', JSON.stringify(data));
            } catch (e) {
                console.error('Storage Error:', e);
            }
        }

        function loadFromStorage() {
            try {
                const stored = localStorage.getItem('warmap_intel');
                if (stored) {
                    const data = JSON.parse(stored);
                    data.forEach(intel => {
                        if (intel && intel.lat && intel.lng) {
                            addMarker(intel);
                            intelDatabase.push(intel);
                        }
                    });
                    updatePanel();
                }
            } catch (e) {
                console.error('Load Error:', e);
            }
        }

        // ================== UI UPDATES ==================
        function updateUI() {
            document.getElementById('sourceCount').textContent = NEWS_SOURCES.length;
            document.getElementById('markerCount').textContent = markers.length;
        }

        function updatePanel() {
            const container = document.getElementById('panelContent');
            
            if (intelDatabase.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; color:var(--text-dim); padding:40px 20px;">
                        <i class="fas fa-satellite" style="font-size:3rem; margin-bottom:15px; opacity:0.5;"></i>
                        <div>Keine Daten verfügbar.<br>Starte einen Global Scan.</div>
                    </div>`;
                return;
            }
            
            container.innerHTML = intelDatabase.slice(0, 20).map(intel => `
                <div class="intel-item" onclick="focusMarker(${intel.id})">
                    <div class="intel-item-title">${intel.title}</div>
                    <div style="font-size:0.9rem; color:var(--text-dim); margin-top:4px;">
                        ${intel.summary.substring(0, 60)}...
                    </div>
                    <div class="intel-item-meta">
                        <span>${intel.source}</span>
                        <span class="confidence-badge conf-${intel.confidence > 80 ? 'high' : intel.confidence > 60 ? 'med' : 'low'}">
                            ${intel.confidence}%
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function focusMarker(id) {
            const item = markers.find(m => m.id === id);
            if (item) {
                map.flyTo([item.data.lat, item.data.lng], 10);
                item.marker.openPopup();
                togglePanel();
            }
        }

        function togglePanel() {
            document.getElementById('sidePanel').classList.toggle('open');
        }

        // ================== TICKER ==================
        function addToTicker(text, type) {
            const ticker = document.getElementById('ticker');
            const div = document.createElement('div');
            div.className = `ticker-item ${type || ''}`;
            div.innerHTML = type === 'alert' ? '<div class="ticker-dot"></div>' : '';
            div.innerHTML += `<span>${new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} | ${text}</span>`;
            
            ticker.appendChild(div);
            
            // Limit items to prevent memory leak
            if (ticker.children.length > 50) {
                ticker.removeChild(ticker.firstChild);
            }
        }

        // ================== TOAST ==================
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
            const color = type === 'success' ? '#10b981' : type === 'error' ? '#f43f5e' : '#06b6d4';
            
            toast.innerHTML = `<i class="fas fa-${icon}" style="color:${color};"></i><span>${msg}</span>`;
            toast.className = `toast show ${type}`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ================== CONTROLS ==================
        function clearAllData() {
            if (!confirm('Wirklich alle Marker und Daten löschen?')) return;
            
            markers.forEach(m => map.removeLayer(m.marker));
            markers = [];
            intelDatabase = [];
            localStorage.removeItem('warmap_intel');
            updateUI();
            updatePanel();
            showToast('Alle Daten gelöscht', 'info');
        }

        function exportData() {
            try {
                const data = markers.map(m => m.data);
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `warmap_export_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Export erfolgreich', 'success');
            } catch (e) {
                showToast('Export fehlgeschlagen', 'error');
            }
        }

        function locateUser() {
            if (!navigator.geolocation) {
                showToast('Geolocation nicht verfügbar', 'error');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const {latitude, longitude} = pos.coords;
                    map.flyTo([latitude, longitude], 13);
                    L.marker([latitude, longitude]).addTo(map)
                        .bindPopup('Dein Standort').openPopup();
                    showToast('Standort gefunden', 'success');
                },
                () => showToast('Standortzugriff verweigert', 'error')
            );
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('sidePanel').classList.remove('open');
                if (isScanning) stopScan();
            }
            if (e.key === 's' && e.ctrlKey) {
                e.preventDefault();
                startGlobalScan();
            }
        });
    </script>
</body>
</html>
